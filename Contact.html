<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Shreya Bhunia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Contact.css">
    <script src="script.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">Shreya<span>.</span></div>
        <div class="nav-links">
            <a href="portfolio.html">Home</a>
            <a href="Resume.html">Resume</a>
            <a href="Project.html">Projects</a>
            <a href="Contact.html" class="active">Contact</a>
        </div>
    </nav>
    <div class="page-container center-content">
        <h1 class="page-title animate-on-scroll">Get In Touch</h1>
        <div class="contact-container glass animate-on-scroll">

            <div class="contact-info">
                <h2>Let's Talk</h2>
                <p>Looking forward to hearing from you. Feel free to reach out via the form, phone, or email.</p>
                <div class="info-block">
                    <div class="icon">&#128222;</div>
                    <div class="details">
                        <h3>Phone</h3>
                        <p>6297971342</p>
                    </div>
                </div>
                <div class="info-block">
                    <div class="icon">&#9993;&#65039;</div>
                    <div class="details">
                        <h3>Email</h3>
                        <p>shreyabhunia680@gmail.com</p>
                    </div>
                </div>
            </div>

            <div class="contact-form-wrapper">
                <form action="/action" class="contact-form">
                    <div class="input-group">
                        <div class="input-box">
                            <input type="text" id="firstname" required placeholder=" "/>
                            <label for="firstname">First Name</label>
                        </div>
                        <div class="input-box">
                            <input type="text" id="lastname" required placeholder=" "/>
                            <label for="lastname">Last Name</label>
                        </div>
                    </div>
                    <div class="input-box">
                        <input type="email" id="Email" required placeholder=" "/>
                        <label for="Email">Email Address</label>
                    </div>
                    <div class="input-box">
                        <input type="text" id="Subject" required placeholder=" "/>
                        <label for="Subject">Subject</label>
                    </div>
                    <div class="input-box">
                        <textarea id="message" required placeholder=" " rows="4"></textarea>
                        <label for="message">Your Message</label>
                    </div>
                    <button type="submit" class="btn-3d submit-btn">Send Message &#128640;</button>
                </form>
            </div>

        </div>
    </div>
</body>
</html>
